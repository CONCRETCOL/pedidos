<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin · Concretcol SAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cement: #2C2C2C;
      --sand: #E8DCC8;
      --orange: #E85D04;
      --orange-dark: #C44E00;
      --white: #F9F6F1;
      --gray: #888;
      --error: #D62828;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cement);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
      pointer-events: none;
    }

    /* Concrete block decorations */
    .bg-block {
      position: fixed;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .bg-block:nth-child(1) { width: 200px; height: 300px; top: -50px; left: -60px; transform: rotate(15deg); }
    .bg-block:nth-child(2) { width: 150px; height: 200px; bottom: -30px; right: -40px; transform: rotate(-10deg); }
    .bg-block:nth-child(3) { width: 80px; height: 80px; top: 30%; right: 10%; transform: rotate(30deg); }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
    }

    .card-header {
      background: var(--cement);
      padding: 32px 36px 28px;
      border-bottom: 3px solid var(--orange);
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 60px; height: 3px;
      background: var(--sand);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 22px; height: 22px; fill: white; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 300;
      margin-top: 1px;
    }

    .card-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .card-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
      font-weight: 300;
    }

    .card-body {
      padding: 36px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #DDDAD3;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--cement);
      background: #FAF8F5;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,93,4,0.12);
      background: white;
    }

    .password-wrap {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--gray);
      padding: 4px;
      line-height: 0;
    }

    .toggle-pass:hover { color: var(--cement); }

    .error-msg {
      display: none;
      background: #FFF0F0;
      border: 1px solid #FFD0D0;
      border-left: 3px solid var(--error);
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 20px;
      animation: shake 0.3s ease;
    }

    .error-msg.show { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover { background: var(--orange-dark); }
    .btn-login:active { transform: scale(0.99); }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-login .btn-text { transition: opacity 0.2s; }
    .btn-login.loading .btn-text { opacity: 0; }

    .spinner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login.loading .spinner { opacity: 1; }

    .spinner::after {
      content: '';
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card-footer {
      padding: 16px 36px;
      background: #F4F0E8;
      border-top: 1px solid #EAE5D8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-footer svg { flex-shrink: 0; color: var(--gray); }

    .card-footer p {
      font-size: 11.5px;
      color: #999;
      line-height: 1.4;
    }

    /* Success flash */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--cement);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .success-overlay svg { color: var(--orange); animation: popIn 0.4s 0.1s both; }
    .success-overlay p {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: white;
      animation: popIn 0.4s 0.2s both;
      letter-spacing: 0.05em;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg-block"></div>
  <div class="bg-block"></div>
  <div class="bg-block"></div>

  <div class="login-wrapper">
    <div class="card">
      <div class="card-header">
        <div class="brand">
          <div class="brand-icon">
            <!-- Building/concrete icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 21V9l7-6 7 6v12H1zM10 21v-5H6v5h4zM15 21V11.5l5-3.5v13h-5zM3 19h2v-2H3v2zm0-4h2v-2H3v2zm4 4h2v-2H7v2zm0-4h2v-2H7v2z"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">Concretcol SAS</div>
            <div class="brand-sub">Sistema de Gestión</div>
          </div>
        </div>
        <h1>Panel de Administración</h1>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <div class="card-body">
        <div class="error-msg" id="errorMsg">
          ⚠️ Usuario o contraseña incorrectos. Intenta de nuevo.
        </div>

        <div class="field">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="toggle-pass" type="button" id="togglePass" title="Mostrar/ocultar contraseña">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" type="button">
          <span class="btn-text">Ingresar al Panel</span>
          <div class="spinner"></div>
        </button>
      </div>

      <div class="card-footer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <p>Acceso restringido. Solo personal autorizado de Concretcol SAS.</p>
      </div>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <p>Acceso concedido. Redirigiendo...</p>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN DE CREDENCIALES
    // Cambia estos valores antes de subir a Netlify
    // ============================================================
    const CREDENTIALS = [
      { user: 'admin',       pass: 'despo2546*' },
      { user: 'supervisor',  pass: 'Super@2024'       },
      // Agrega más usuarios si necesitas:
      // { user: 'otro', pass: 'OtraPass123' },
    ];

    const SESSION_KEY = 'concretcol_admin_auth';
    const SESSION_DURATION_HOURS = 8;
    // ============================================================

    // Redirect if already logged in
    const session = sessionStorage.getItem(SESSION_KEY);
    if (session) {
      try {
        const { expires } = JSON.parse(session);
        if (Date.now() < expires) {
          window.location.href = 'admin.html';
        }
      } catch(e) { sessionStorage.removeItem(SESSION_KEY); }
    }

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const loginBtn   = document.getElementById('loginBtn');
    const errorMsg   = document.getElementById('errorMsg');
    const togglePass = document.getElementById('togglePass');
    const successOv  = document.getElementById('successOverlay');

    // Toggle password visibility
    togglePass.addEventListener('click', () => {
      const isPass = passwordEl.type === 'password';
      passwordEl.type = isPass ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = isPass
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    // Login on Enter
    [usernameEl, passwordEl].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    loginBtn.addEventListener('click', doLogin);

    function doLogin() {
      const user = usernameEl.value.trim();
      const pass = passwordEl.value;

      if (!user || !pass) {
        showError('Por favor ingresa usuario y contraseña.');
        return;
      }

      loginBtn.classList.add('loading');
      errorMsg.classList.remove('show');

      // Simulate brief delay for UX
      setTimeout(() => {
        const match = CREDENTIALS.find(c => c.user === user && c.pass === pass);

        if (match) {
          const expires = Date.now() + SESSION_DURATION_HOURS * 60 * 60 * 1000;
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user, expires }));

          // Show success and redirect
          loginBtn.classList.remove('loading');
          successOv.classList.add('show');
          setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
        } else {
          loginBtn.classList.remove('loading');
          showError('Usuario o contraseña incorrectos. Intenta de nuevo.');
          passwordEl.value = '';
          passwordEl.focus();
        }
      }, 600);
    }

    function showError(msg) {
      errorMsg.textContent = '⚠️ ' + msg;
      errorMsg.classList.remove('show');
      void errorMsg.offsetWidth; // force reflow for animation
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
