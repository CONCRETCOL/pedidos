<script>
(function() {
  var SESSION_KEY = 'concretcol_admin_auth';
  var authorized = false;
  try {
    var s = sessionStorage.getItem(SESSION_KEY);
    if (s) {
      var data = JSON.parse(s);
      if (Date.now() < data.expires) authorized = true;
    }
  } catch(e) {}
  if (!authorized) {
    document.documentElement.style.visibility = 'hidden';
    window.location.replace('admin-login.html');
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Concretcol SAS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#1B3E8E;--c2:#2D5FCC;--c3:#E8EDF8;--c4:#0F2660;
  --amber:#BA7517;--amberL:#FAEEDA;
  --blue:#1B3E8E;--blueL:#E8EDF8;
  --coral:#993C1D;--coralL:#FAECE7;
  --verde:#8DC63F;--verdeL:#F2F8E8;
  --gray:#5F5E5A;--grayL:#F1EFE8;
  --bg:#F4F6FB;--surface:#fff;
  --border:#DDE2EF;--border2:#B8C4E0;
  --text:#1A1F36;--text2:#6B7280;--text3:#9CA3AF;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);flex-wrap:gap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--c1);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:17px;font-weight:600}
.logo-sub{font-size:12px;color:var(--text3)}
.sync-status{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.sync-dot.ok{background:var(--c2)}
.sync-dot.err{background:#E24B4A}
.sync-dot.connecting{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;gap:2px;background:#ECEAE4;border-radius:9px;padding:3px;margin-bottom:1.5rem}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section{display:none}
.section.active{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;color:var(--text)}
.card-title svg{width:18px;height:18px;stroke:var(--c1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);transition:border-color .15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--c2);background:#fff}
.field textarea{min-height:64px;resize:vertical}
.btn-primary{background:var(--c1);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:7px}
.btn-primary:hover{background:var(--c4)}
.btn-primary:active{transform:scale(.98)}
.btn-sm{padding:6px 13px;font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm:hover{background:var(--bg)}
.btn-sm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-sm.green{color:var(--c1);border-color:#9FE1CB}.btn-sm.green:hover{background:var(--c3)}
.btn-sm.blue{color:var(--blue);border-color:#B5D4F4}.btn-sm.blue:hover{background:var(--blueL)}
.btn-sm.teal{color:var(--c4);border-color:#5DCAA5}.btn-sm.teal:hover{background:var(--c3)}
.btn-sm.danger{color:#993C1D;border-color:#F5A88A}.btn-sm.danger:hover{background:var(--coralL)}
.confirm-delete-box{background:var(--coralL);border:1px solid #F5A88A;border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-size:13px;color:var(--coral);line-height:1.6}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;text-align:center}

.stat.amber .stat-n{color:var(--amber)}

.order-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem}

.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px;margin-bottom:1rem}

.di-val{font-size:13px;font-weight:500;color:var(--text)}
.tl-wrap{margin:1rem 0}
.tl-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.timeline{display:flex;flex-direction:column}
.tl-step{display:flex;gap:12px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}

.tl-dot.done{background:var(--c3)}.tl-dot.done svg{stroke:var(--c4)}
.tl-dot.pending{background:#F1EFE8;border:1.5px dashed #CFCECA}.tl-dot.pending svg{stroke:var(--text3)}
.tl-dot svg{width:14px;height:14px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.tl-connector{width:2px;background:var(--border);flex:1;min-height:14px;margin:2px 0}
.tl-content{flex:1;padding-bottom:14px;padding-top:4px}
.tl-title{font-size:13px;font-weight:600;color:var(--text)}
.tl-date{font-size:12px;color:var(--text2);margin-top:1px}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.share-box{background:var(--c3);border:1px solid #9FE1CB;border-radius:var(--radius);padding:.75rem 1rem;margin-top:.75rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.share-url{font-size:12px;color:var(--c4);font-family:monospace;flex:1;word-break:break-all}
.share-btns{display:flex;gap:6px;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;padding:1rem}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;width:400px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:15px;font-weight:600}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:6px;transition:background .15s;display:flex}
.close-btn:hover{background:var(--bg)}
.close-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:14px}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c4);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
@media(max-width:520px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .field-row{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let db = null;
let orders = [];
let currentModal = null;

// ===== URL DE TRACKING FIJA - GitHub Pages =====
const trackingBaseUrl = 'https://concretcol.github.io/pedidos';
// ================================================

const cfg = {
  apiKey:'AIzaSyAaKkFBsJ3TOTRqJ9WYKeE_QC6xIIkwUcU',
  authDomain:'pedidosconcretcol.firebaseapp.com',
  projectId:'pedidosconcretcol',
  storageBucket:'pedidosconcretcol.appspot.com',
  appId:'1:908278232919:web:dd9ff0e3f2241c54fe3012'
};

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

(async function initFirebase() {
  try {
    const app = initializeApp(cfg);
    db = getFirestore(app);
    setSyncStatus('connecting', 'Conectando...');
    const q = query(collection(db, 'pedidos'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      orders = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
      setSyncStatus('ok', 'Sincronizado');
      renderOrders();
    }, (err) => {
      setSyncStatus('err', 'Error de conexión');
      console.error(err);
    });
  } catch(e) {
    setSyncStatus('err', 'Config inválida');
    console.error(e);
  }
})();

async function saveOrder(order) {
  if (db) {
    await setDoc(doc(db, 'pedidos', order.num), order);
  } else {
    const idx = orders.findIndex(o => o.num === order.num);
    if (idx >= 0) orders[idx] = order; else orders.unshift(order);
    renderOrders();
  }
}

async function deleteOrder(num) {
  if (db) {
    await deleteDoc(doc(db, 'pedidos', num));
  } else {
    orders = orders.filter(o => o.num !== num);
    renderOrders();
  }
  toast('✓ Pedido ' + num + ' eliminado');
}

window.createOrder = async function() {
  const num = document.getElementById('inp-num').value.trim();
  const client = document.getElementById('inp-client').value.trim();
  if (!num || !client) { toast('⚠ Completa el número y el cliente'); return; }
  if (orders.find(o => o.num === num)) { toast('⚠ Ya existe un pedido con ese número'); return; }
  const date = document.getElementById('inp-date').value;
  const order = {
    num, client,
    phone: document.getElementById('inp-phone').value.trim(),
    email: '', prod: '', qty: '1',
    city: document.getElementById('inp-city').value.trim(),
    obs: document.getElementById('inp-obs').value.trim(),
    status: 'pedido_recibido',
    createdAt: new Date().toISOString().split('T')[0],
    fechaRecibido: date || new Date().toISOString().split('T')[0],
    fechaSalida: null, transportadora: null, guia: null,
    fechaDespacho: null, fechaEntrega: null,
  };
  await saveOrder(order);
  toast('✓ Pedido ' + num + ' registrado');
  ['inp-num','inp-client','inp-phone','inp-city','inp-obs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-date').value = '';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('es-CO', {day:'2-digit', month:'short', year:'numeric'});
}

function badgeHtml(status) {
  const map = {pedido_recibido:'b-pendiente',pago_verificado:'b-verde',en_produccion:'b-produccion',listo_despacho:'b-orange',despachado:'b-despachado',entregado:'b-entregado',novedad:'b-coral'};
  const labels = {pedido_recibido:'Recibido',pago_verificado:'Pago verificado',en_produccion:'En producción',listo_despacho:'Listo despacho',despachado:'Despachado',entregado:'Entregado',novedad:'Novedad'};
  return `<span class="badge ${map[status]||'b-pendiente'}">${labels[status]||status}</span>`;
}

function getTrackingUrl(num, phone) {
  const base = trackingBaseUrl.endsWith('/') ? trackingBaseUrl : trackingBaseUrl + '/';
  let url = base + 'tracking.html?pedido=' + encodeURIComponent(num);
  if (phone) url += '&tel=' + encodeURIComponent(phone.replace(/\D/g, ''));
  return url;
}

function shareHtml(o) {
  const url = getTrackingUrl(o.num, o.phone);
  const waMsg = encodeURIComponent(`Pago Recibido. \n\nLe compartimos el siguiente enlace para que pueda hacer seguimiento en tiempo real al estado de su pedido durante el proceso de producción, despacho y entrega:\n\n🔗 ${url}\n\nAdicionalmente, estos son los números del área de despachos para cualquier información relacionada con su envío:\n📱 3122250914\n📱 3196716544\n\nQuedamos atentos a cualquier inquietud.`);
  const waUrl = `https://wa.me/${(o.phone||'').replace(/\D/g,'')}?text=${waMsg}`;
  return `<div class="share-box">
    <span class="share-url">${url}</span>
    <div class="share-btns">
      <button class="btn-sm" onclick="copyLink('${url}')">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar
      </button>
      ${o.phone ? `<button class="btn-sm green" onclick="window.open('${waUrl}','_blank')">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>WhatsApp
      </button>` : ''}

}

window.copyLink = function(url) {
  navigator.clipboard.writeText(url).then(() => toast('✓ Link copiado'));
}

function buildTimeline(o) {
  const steps = [
    {label:'Pedido registrado', date:o.createdAt, done:true, extra:''},
    {label:'Salida de producción', date:o.fechaSalida, done:!!o.fechaSalida, extra:''},
    {label:'Despachado con transportadora', date:o.fechaDespacho, done:!!o.fechaDespacho, extra:o.transportadora?(o.transportadora+(o.guia?' · Guía: '+o.guia:'')):''},
    {label:'Entregado al cliente', date:o.fechaEntrega, done:!!o.fechaEntrega, extra:''},
  ];
  const chk = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  const dot = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>`;
  return `<div class="timeline">${steps.map((s,i)=>`
    <div class="tl-step">
      <div class="tl-left">
        <div class="tl-dot ${s.done?'done':'pending'}">${s.done?chk:dot}</div>
        ${i<steps.length-1?'<div class="tl-connector"></div>':''}
      </div>
      <div class="tl-content">
        <div class="tl-title">${s.label}</div>
        <div class="tl-date">${s.done?fmtDate(s.date)+(s.extra?' · '+s.extra:''):'Pendiente'}</div>
      </div>
    </div>`).join('')}</div>`;
}

function buildActions(o) {
  let btns = '';
  if (!o.fechaRecibido) btns += `<button class="btn-sm" onclick="event.stopPropagation();openModal('recibido','${o.num}')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Registrar recibido</button>`;
  if (!o.fechaPago) btns += `<button class="btn-sm green" onclick="event.stopPropagation();openModal('pago','${o.num}')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Verificar pago</button>`;
  if (o.fechaPago && (!o.fechaSalidaPlaneada || !o.fechaDespachoPlan)) btns += `<button class="btn-sm" onclick="event.stopPropagation();openModal('planeado','${o.num}')" style="color:#7B3F00;border-color:#FFCC80"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Fechas planeadas</button>`;
  if (o.fechaPago && !o.fechaSalida) btns += `<button class="btn-sm green" onclick="event.stopPropagation();openModal('salida','${o.num}')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Salida producción</button>`;
  if (o.fechaSalida && !o.fechaListoDespacho) btns += `<button class="btn-sm" onclick="event.stopPropagation();openModal('listo','${o.num}')" style="color:#E65100;border-color:#FFD180"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Listo para despacho</button>`;
  if (o.fechaListoDespacho && !o.fechaDespacho) btns += `<button class="btn-sm blue" onclick="event.stopPropagation();openModal('despacho','${o.num}')"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Registrar despacho</button>`;
  if (o.fechaDespacho && !o.fechaEntrega) btns += `<button class="btn-sm teal" onclick="event.stopPropagation();openModal('entrega','${o.num}')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Registrar entrega</button>`;
  if (o.status === 'entregado') btns += `<button class="btn-sm danger" onclick="event.stopPropagation();openModal('eliminar','${o.num}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Eliminar pedido</button>`;
  return btns;
}

window.toggleRow = function(num) {
  const row = document.getElementById('row-' + num);
  const wasOpen = row.classList.contains('open');
  document.querySelectorAll('.order-row').forEach(r => r.classList.remove('open'));
  if (!wasOpen) row.classList.add('open');
}

window.renderOrders = function() {
  renderStats();
  const txt = (document.getElementById('filter-text')?.value||'').toLowerCase();
  const st = document.getElementById('filter-status')?.value||'';
  const list = orders.filter(o => {
    const m = !txt||(o.num.toLowerCase().includes(txt)||o.client.toLowerCase().includes(txt)||(o.city||'').toLowerCase().includes(txt));
    return m && (!st||o.status===st);
  });
  const el = document.getElementById('orders-list');
  if (!el) return;
  if (!list.length) { el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg><div>Sin pedidos</div></div>`; return; }
  el.innerHTML = list.map(o => orderHtml(o)).join('');
}

function renderStats() {
  const el = document.getElementById('stats-bar');

    <div class="stat"><div class="stat-n">${orders.length}</div><div class="stat-l">Total</div></div>
    <div class="stat amber"><div class="stat-n">${orders.filter(o=>['en_produccion','listo_despacho'].includes(o.status)).length}</div><div class="stat-l">En producción</div></div>
    <div class="stat blue"><div class="stat-n">${orders.filter(o=>o.status==='despachado').length}</div><div class="stat-l">Despachados</div></div>
    <div class="stat green"><div class="stat-n">${orders.filter(o=>o.status==='entregado').length}</div><div class="stat-l">Entregados</div></div>`;
}

    <button class="btn-primary" onclick="confirmModal()"><svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round"><polyline points="20 6 9 17 4 12"/></svg> Guardar</button>`;
  } else if (type==='pago') {
    title='Verificar Pago en Bancos';
    body=`<div class="field" style="margin-bottom:20px"><label>Fecha de confirmación *</label><input type="date" id="m-date" value="${today}"></div>
    <button class="btn-primary" onclick="confirmModal()"><svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Confirmar pago verificado</button>`;

    title='Registrar salida de producción';

    <button class="btn-primary" onclick="confirmModal()"><svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Confirmar listo</button>`;
  } else if (type==='despacho') {

    body=`<div class="field" style="margin-bottom:12px"><label>Transportadora *</label><input type="text" id="m-trans" placeholder="Ej: Servientrega, Coordinadora, TCC..."></div>
    <div class="field" style="margin-bottom:12px"><label>N° de guía</label><input type="text" id="m-guia" placeholder="Número de guía"></div>
    <div class="field" style="margin-bottom:12px"><label>Fecha de despacho *</label><input type="date" id="m-date" value="${today}"></div>

  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>{const f=document.querySelector('#modal-body input');if(f)f.focus();},100);
}

window.closeModal = function() {
  document.getElementById('modal-bg').classList.remove('open');
  currentModal = null;
}

window.confirmModal = async function() {
  if (!currentModal) return;
  const {type, num} = currentModal;
  const o = orders.find(x => x.num === num);
  if (!o) return;
  const updated = {...o};
  if (type==='recibido') {
    const d = document.getElementById('m-date').value;
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.fechaRecibido = d; updated.status = 'pedido_recibido';
    toast('✓ Fecha de recibido registrada');
  } else if (type==='pago') {
    const d = document.getElementById('m-date').value;
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.fechaPago = d; updated.status = 'pago_verificado';
    toast('✓ Pago verificado');
  } else if (type==='planeado') {
    const dsal = document.getElementById('m-dsal').value;
    const ddesp = document.getElementById('m-ddesp').value;
    if (!dsal && !ddesp) { toast('⚠ Ingresa al menos una fecha'); return; }
    if (dsal) updated.fechaSalidaPlaneada = dsal;
    if (ddesp) updated.fechaDespachoPlan = ddesp;
    toast('✓ Fechas planeadas registradas');
  } else if (type==='salida') {
    const d = document.getElementById('m-date').value;
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.fechaSalida = d; updated.status = 'en_produccion';
    toast('✓ Salida de producción registrada');
  } else if (type==='listo') {
    const d = document.getElementById('m-date').value;
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.fechaListoDespacho = d; updated.status = 'listo_despacho';
    toast('✓ Pedido marcado como listo para despacho');
  } else if (type==='despacho') {
    const trans = document.getElementById('m-trans').value.trim();
    const d = document.getElementById('m-date').value;
    if (!trans||!d) { toast('⚠ Completa transportadora y fecha'); return; }
    updated.transportadora = trans;
    updated.guia = document.getElementById('m-guia').value.trim();
    updated.fechaDespacho = d; updated.status = 'despachado';
    const fest = document.getElementById('m-festimada').value;
    if (fest) updated.fechaEstimadaEntrega = fest;
    toast('✓ Despacho registrado con ' + trans);
  } else if (type==='entrega') {
    const d = document.getElementById('m-date').value;
    if (!d) { toast('⚠ Selecciona fecha de entrega'); return; }
    updated.fechaEntrega = d; updated.status = 'entregado';
    const nota = document.getElementById('m-note').value.trim();
    if (nota) updated.obs = (updated.obs?updated.obs+' | ':'') + 'Recibido por: '+nota;
    toast('✓ Entrega confirmada');
  } else if (type==='eliminar') {
    const confirmNum = document.getElementById('m-confirm-num').value.trim();
    if (confirmNum !== num) { toast('⚠ El número de pedido no coincide'); return; }
    await deleteOrder(num);
    closeModal();
    return;
  }
  await saveOrder(updated);
  closeModal();
}

window.searchOrder = function() {
  const q = document.getElementById('search-num').value.trim().toLowerCase();
  const el = document.getElementById('search-result');
  if (!q) { el.innerHTML=''; return; }
  const matches = orders.filter(o => o.num.toLowerCase().includes(q)||o.client.toLowerCase().includes(q));
  if (!matches.length) { el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div>No se encontró ningún pedido</div></div>`; return; }
  el.innerHTML = matches.map(o=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div><div style="font-weight:600;font-size:16px">${o.num}</div><div style="font-size:12px;color:var(--text2)">${o.client}${o.city?' · '+o.city:''}</div></div>
        ${badgeHtml(o.status)}
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Link de seguimiento</div>
      ${shareHtml(o)}
      <div class="tl-wrap"><div class="tl-label">Seguimiento</div>${buildTimeline(o)}</div>
      <div class="action-btns">${buildActions(o)}</div>
    </div>`).join('');
}

window.exportCSV = function() {
  if (!orders.length) { toast('No hay pedidos'); return; }
  const h = ['N° Pedido','Cliente','Teléfono','Email','Producto','Cantidad','Ciudad','Estado','Creado','Salida Prod.','Transportadora','Guía','Despachado','Entregado','Observaciones'];
  const rows = orders.map(o=>[o.num,o.client,o.phone||'',o.email||'',o.prod||'',o.qty,o.city||'',o.status,o.createdAt||'',o.fechaSalida||'',o.transportadora||'',o.guia||'',o.fechaDespacho||'',o.fechaEntrega||'',o.obs||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"'));
  const csv = [h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pedidos_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('✓ Exportado');
}

window.switchTab = function(name) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx={nuevo:0,pedidos:1,buscar:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='pedidos') renderOrders();
  if(name==='buscar'){document.getElementById('search-num').value='';document.getElementById('search-result').innerHTML='';}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
window.toast = toast;

document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderStats();
</script>
</body>
</html>
