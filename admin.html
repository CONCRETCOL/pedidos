<script>
(function() {
  var SESSION_KEY = 'concretcol_admin_auth';
  var authorized = false;
  try {
    var s = sessionStorage.getItem(SESSION_KEY);
    if (s) {
      var data = JSON.parse(s);
      if (Date.now() < data.expires) authorized = true;
    }
  } catch(e) {}
  if (!authorized) {
    document.documentElement.style.visibility = 'hidden';
    window.location.replace('admin-login.html');
  }
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#1B3E8E;--c2:#2D5FCC;--c3:#E8EDF8;--c4:#0F2660;
  --amber:#BA7517;--amberL:#FAEEDA;
  --blue:#1B3E8E;--blueL:#E8EDF8;
  --coral:#993C1D;--coralL:#FAECE7;
  --verde:#8DC63F;--verdeL:#F2F8E8;
  --gray:#5F5E5A;--grayL:#F1EFE8;
  --teal:#1A7A6E;--tealL:#E0F5F2;
  --purple:#534AB7;--purpleL:#EEEDFE;
  --bg:#F4F6FB;--surface:#fff;
  --border:#DDE2EF;--border2:#B8C4E0;
  --text:#1A1F36;--text2:#6B7280;--text3:#9CA3AF;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--c1);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:17px;font-weight:600}
.logo-sub{font-size:12px;color:var(--text3)}
.sync-status{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.sync-dot.ok{background:var(--c2)}
.sync-dot.err{background:#E24B4A}
.sync-dot.connecting{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.tabs{display:flex;gap:2px;background:#ECEAE4;border-radius:9px;padding:3px;margin-bottom:1.5rem}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section{display:none}
.section.active{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;color:var(--text)}
.card-title svg{width:18px;height:18px;stroke:var(--c1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-row.full{grid-template-columns:1fr}
.field-row.three{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);transition:border-color .15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--c2);background:#fff}
.field textarea{min-height:64px;resize:vertical}

.btn-primary{background:var(--c1);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:7px}
.btn-primary:hover{background:var(--c4)}
.btn-primary:active{transform:scale(.98)}
.btn-sm{padding:6px 13px;font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm:hover{background:var(--bg)}
.btn-sm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-sm.green{color:var(--c1);border-color:#9FE1CB}.btn-sm.green:hover{background:var(--c3)}
.btn-sm.blue{color:var(--blue);border-color:#B5D4F4}.btn-sm.blue:hover{background:var(--blueL)}
.btn-sm.teal{color:var(--teal);border-color:#5DCAA5}.btn-sm.teal:hover{background:var(--tealL)}
.btn-sm.purple{color:var(--purple);border-color:#AFA9EC}.btn-sm.purple:hover{background:var(--purpleL)}
.btn-sm.amber{color:var(--amber);border-color:#FAC775}.btn-sm.amber:hover{background:var(--amberL)}
.btn-sm.danger{color:#993C1D;border-color:#F5A88A}.btn-sm.danger:hover{background:var(--coralL)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

.b-produccion{background:var(--amberL);color:var(--amber)}

.b-verde{background:var(--verdeL);color:#4A7A1A}
.b-orange{background:#FFF3E0;color:#E65100}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;text-align:center}
.stat-n{font-size:24px;font-weight:600;line-height:1}

.orders-list{display:flex;flex-direction:column;gap:8px}

.tl-wrap{margin:1rem 0}

.timeline{display:flex;flex-direction:column}

.close-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:6px;transition:background .15s;display:flex}
.close-btn:hover{background:var(--bg)}
.close-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* Modal field styles */
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);transition:border-color .15s;outline:none}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--c2);background:#fff}
.modal-field textarea{min-height:60px;resize:vertical}

/* Radio options */
.radio-group{display:flex;gap:10px;margin-bottom:14px}
.radio-opt{flex:1;border:2px solid var(--border);border-radius:var(--radius);padding:10px 14px;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;user-select:none}
.radio-opt:hover{border-color:var(--border2);background:var(--bg)}
.radio-opt.selected{border-color:var(--c2);background:var(--c3);color:var(--c1);font-weight:600}
.radio-opt input{display:none}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:14px}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--c4);color:#fff;padding:11px 22px;border-radius:var(--radius);font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* Edit section highlight */
.edit-highlight{background:#FFF8E6;border:1px solid #FAC775;border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem;font-size:12px;color:#633806}

@media(max-width:520px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .field-row{grid-template-columns:1fr}
  .field-row.three{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
  .radio-group{flex-direction:column}
}
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let db = null;
let orders = [];
let unsubscribe = null;
let currentModal = null;
let trackingBaseUrl = 'https://concretcol.github.io/pedidos';

const cfg = {apiKey:'AIzaSyAaKkFBsJ3TOTRqJ9WYKeE_QC6xIIkwUcU',authDomain:'pedidosconcretcol.firebaseapp.com',projectId:'pedidosconcretcol',storageBucket:'pedidosconcretcol.appspot.com',appId:'1:908278232919:web:dd9ff0e3f2241c54fe3012'};

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

async function initFirebase(config) {
  try {
    const app = initializeApp(config);
    db = getFirestore(app);
    setSyncStatus('connecting', 'Conectando...');
    const q = query(collection(db, 'pedidos'), orderBy('createdAt', 'desc'));
    unsubscribe = onSnapshot(q, (snapshot) => {
      orders = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
      setSyncStatus('ok', 'Sincronizado');
      renderOrders();
    }, (err) => {
      setSyncStatus('err', 'Error de conexión');
      console.error(err);
    });
  } catch(e) {
    setSyncStatus('err', 'Config inválida');
  }
}

initFirebase(cfg);

async function saveOrder(order) {
  if (db) {
    await setDoc(doc(db, 'pedidos', order.num), order);
  } else {
    const idx = orders.findIndex(o => o.num === order.num);
    if (idx >= 0) orders[idx] = order; else orders.unshift(order);
    renderOrders();
  }
}

async function deleteOrder(num) {
  if (db) {
    await deleteDoc(doc(db, 'pedidos', num));
  } else {
    orders = orders.filter(o => o.num !== num);
    renderOrders();
  }
  toast('✓ Pedido ' + num + ' eliminado');
}

window.createOrder = async function() {
  const num = document.getElementById('inp-num').value.trim();
  const client = document.getElementById('inp-client').value.trim();
  if (!num || !client) { toast('⚠ Completa el número y el cliente'); return; }
  if (orders.find(o => o.num === num)) { toast('⚠ Ya existe un pedido con ese número'); return; }
  const date = document.getElementById('inp-date').value;
  const order = {
    num, client,
    phone: document.getElementById('inp-phone').value.trim(),
    city: document.getElementById('inp-city').value.trim(),
    obs: document.getElementById('inp-obs').value.trim(),
    status: 'pedido_recibido',
    createdAt: new Date().toISOString().split('T')[0],
    fechaRecibido: date || new Date().toISOString().split('T')[0],
    // All fields nullable
    fechaPago: null,
    fechaEntradaProduccion: null,
    fechaDespachoPlan: null,
    tipoEntrega: null, // 'transportadora' | 'recoge_cliente'
    fechaDisponibleRecogida: null,
    horaDisponibleRecogida: null,
    transportadora: null,
    guia: null,
    fechaDespacho: null,
    fechaEstimadaEntrega: null,
    fechaEntrega: null,
    facturaEnviada: null,
  };
  await saveOrder(order);
  toast('✓ Pedido ' + num + ' registrado');
  ['inp-num','inp-client','inp-phone','inp-city','inp-obs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-date').value = '';
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('es-CO', {day:'2-digit', month:'short', year:'numeric'});
}

function fmtDateTime(d, h) {
  let out = fmtDate(d);
  if (h) out += ' · ' + h;
  return out;
}

function badgeHtml(o) {
  const status = o.status;
  const map = {
    pedido_recibido:'b-pendiente',
    pago_verificado:'b-verde',
    en_produccion:'b-produccion',
    listo_despacho:'b-orange',
    despachado:'b-despachado',
    recogida_cliente:'b-recogida',
    factura_enviada:'b-teal',
    entregado:'b-entregado',
    novedad:'b-coral'
  };
  const labels = {
    pedido_recibido:'Recibido',
    pago_verificado:'Pago verificado',
    en_produccion:'En producción',
    listo_despacho:'Listo despacho',
    despachado:'Despachado',
    recogida_cliente:'Recogida cliente',
    factura_enviada:'Factura enviada',
    entregado:'Entregado',
    novedad:'Novedad'
  };
  return `<span class="badge ${map[status]||'b-pendiente'}">${labels[status]||status}</span>`;
}

function getTrackingUrl(num, phone) {
  if (!trackingBaseUrl) return null;
  const base = trackingBaseUrl.endsWith('/') ? trackingBaseUrl : trackingBaseUrl + '/';
  let url = base + 'tracking.html?pedido=' + encodeURIComponent(num);
  if (phone) url += '&tel=' + encodeURIComponent(phone.replace(/\D/g, ''));
  return url;
}

function shareHtml(o) {

  if (!url) return '';

  const waUrl = `https://wa.me/${(o.phone||'').replace(/\D/g,'')}?text=${waMsg}`;

window.copyLink = function(url) {
  navigator.clipboard.writeText(url).then(() => toast('✓ Link copiado'));
}

function buildTimeline(o) {
  // Compatibilidad con pedidos antiguos
  const entradaProd = o.fechaEntradaProduccion || o.fechaSalida || null;
  const despachoPlan = o.fechaDespachoPlan || o.fechaSalidaPlaneada || null;
  const esRecogida = o.tipoEntrega === 'recoge_cliente';
  let steps = [
    {label:'Pedido registrado', date:o.fechaRecibido||o.createdAt, done:true, extra:''},
    {label:'Verificación de pago', date:o.fechaPago, done:!!o.fechaPago, extra:''},
    {label:'Entrada a producción', date:entradaProd, done:!!entradaProd, extra: despachoPlan&&!o.fechaDespacho?'Despacho estimado: '+fmtDate(despachoPlan):''},
  ];

  if (esRecogida) {
    steps.push({label:'Disponible para recogida', date:o.fechaDisponibleRecogida, done:!!o.fechaDisponibleRecogida, extra: o.horaDisponibleRecogida?('Hora: '+o.horaDisponibleRecogida):''});
    steps.push({label:'Recogido por el cliente', date:o.fechaEntrega, done:!!o.fechaEntrega, extra:''});
  } else {
    steps.push({label:'Despacho con transportadora', date:o.fechaDespacho, done:!!o.fechaDespacho, extra:o.transportadora?(o.transportadora+(o.guia?' · Guía: '+o.guia:'')):'', extra2: o.fechaEstimadaEntrega&&!o.fechaEntrega?'Entrega est.: '+fmtDate(o.fechaEstimadaEntrega):''});
    steps.push({label:'Entrega al cliente', date:o.fechaEntrega, done:!!o.fechaEntrega, extra:''});
  }

  steps.push({label:'Factura electrónica enviada', date:o.facturaEnviada, done:!!o.facturaEnviada, extra:''});

  const chk = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  const dot = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>`;
  return `<div class="timeline">${steps.map((s,i)=>`
    <div class="tl-step">
      <div class="tl-left">
        <div class="tl-dot ${s.done?'done':'pending'}">${s.done?chk:dot}</div>
        ${i<steps.length-1?'<div class="tl-connector"></div>':''}
      </div>
      <div class="tl-content">
        <div class="tl-title">${s.label}</div>
        <div class="tl-date">${s.done?fmtDate(s.date)+(s.extra?' · '+s.extra:'')+(s.extra2?' · '+s.extra2:''):'Pendiente'}</div>
      </div>
    </div>`).join('')}</div>`;
}

function buildActions(o) {
  // Compatibilidad con pedidos antiguos
  const entradaProd = o.fechaEntradaProduccion || o.fechaSalida || null;
  let btns = '';
  // 1. Verificación de pago
  if (!o.fechaPago) {
    btns += `<button class="btn-sm green" onclick="event.stopPropagation();openModal('pago','${o.num}')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Verificar pago</button>`;
  } else {
    btns += `<button class="btn-sm edit" onclick="event.stopPropagation();openModal('edit_pago','${o.num}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar pago</button>`;
  }

  // 2. Entrada a producción + fecha estimada despacho
  if (o.fechaPago && !entradaProd) {
    btns += `<button class="btn-sm amber" onclick="event.stopPropagation();openModal('produccion','${o.num}')"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Entrada producción</button>`;
  } else if (entradaProd) {
    btns += `<button class="btn-sm edit" onclick="event.stopPropagation();openModal('edit_produccion','${o.num}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar producción</button>`;
  }

  // 3. Despacho — pregunta tipo de entrega si no está definido
  const esRecogida = o.tipoEntrega === 'recoge_cliente';
  if ((entradaProd || ['listo_despacho','en_produccion'].includes(o.status)) && !o.fechaDespacho && !o.fechaDisponibleRecogida) {
    btns += `<button class="btn-sm blue" onclick="event.stopPropagation();openModal('despacho','${o.num}')"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Registrar despacho</button>`;
  } else if (esRecogida && (o.fechaDisponibleRecogida) && !o.fechaEntrega) {
    btns += `<button class="btn-sm teal" onclick="event.stopPropagation();openModal('entrega_recogida','${o.num}')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Registrar recogida</button>`;
    btns += `<button class="btn-sm edit" onclick="event.stopPropagation();openModal('edit_recogida','${o.num}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar disponibilidad</button>`;
  } else if (!esRecogida && o.fechaDespacho && !o.fechaEntrega) {
    btns += `<button class="btn-sm teal" onclick="event.stopPropagation();openModal('entrega','${o.num}')"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Registrar entrega</button>`;
    btns += `<button class="btn-sm edit" onclick="event.stopPropagation();openModal('edit_despacho','${o.num}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar despacho</button>`;
  }

  // 4. Factura electrónica
  if (o.fechaEntrega && !o.facturaEnviada) {
    btns += `<button class="btn-sm purple" onclick="event.stopPropagation();openModal('factura','${o.num}')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Factura electrónica</button>`;
  } else if (o.facturaEnviada) {
    btns += `<button class="btn-sm edit" onclick="event.stopPropagation();openModal('edit_factura','${o.num}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar factura</button>`;
  }

  // Eliminar
  if (o.status === 'entregado' || o.facturaEnviada) {
    btns += `<button class="btn-sm danger" onclick="event.stopPropagation();openModal('eliminar','${o.num}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Eliminar</button>`;
  }
  return btns;
}

window.toggleRow = function(num) {
  const row = document.getElementById('row-' + num);
  const wasOpen = row.classList.contains('open');
  document.querySelectorAll('.order-row').forEach(r => r.classList.remove('open'));
  if (!wasOpen) row.classList.add('open');
}

window.renderOrders = function() {
  renderStats();
  const txt = (document.getElementById('filter-text')?.value||'').toLowerCase();
  const st = document.getElementById('filter-status')?.value||'';
  const list = orders.filter(o => {
    const m = !txt||(o.num.toLowerCase().includes(txt)||o.client.toLowerCase().includes(txt)||(o.city||'').toLowerCase().includes(txt));
    return m && (!st||o.status===st);
  });
  const el = document.getElementById('orders-list');
  if (!el) return;
  if (!list.length) { el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg><div>Sin pedidos</div></div>`; return; }
  el.innerHTML = list.map(o => orderHtml(o)).join('');
}

function renderStats() {
  const el = document.getElementById('stats-bar');
  if (!el) return;
  el.innerHTML = `
    <div class="stat"><div class="stat-n">${orders.length}</div><div class="stat-l">Total</div></div>
    <div class="stat amber"><div class="stat-n">${orders.filter(o=>['en_produccion','listo_despacho'].includes(o.status)).length}</div><div class="stat-l">En producción</div></div>
    <div class="stat blue"><div class="stat-n">${orders.filter(o=>o.status==='despachado'||o.status==='recogida_cliente').length}</div><div class="stat-l">Despachados</div></div>

}

    body = `<div class="edit-highlight">✏️ Editando registro existente</div>
      <div class="modal-field"><label>Fecha disponible para recogida *</label><input type="date" id="m-fecha-recogida" value="${o?.fechaDisponibleRecogida||today}"></div>
      <div class="modal-field"><label>Hora disponible</label><input type="time" id="m-hora-recogida" value="${o?.horaDisponibleRecogida||''}"></div>
      <button class="btn-primary" onclick="confirmModal()">✓ Guardar cambios</button>`;
  }
  else if (type === 'entrega') {
    title = 'Registro de Entrega';
    body = `
      <div class="modal-field"><label>Fecha de entrega *</label><input type="date" id="m-date" value="${today}"></div>
      <div class="modal-field"><label>Recibido por (opcional)</label><input type="text" id="m-note" placeholder="Nombre de quien recibió..."></div>
      <button class="btn-primary" onclick="confirmModal()">✓ Confirmar entrega</button>`;
  }
  else if (type === 'entrega_recogida') {
    title = 'Confirmar Recogida por el Cliente';
    body = `
      <div class="modal-field"><label>Fecha en que fue recogido *</label><input type="date" id="m-date" value="${today}"></div>
      <div class="modal-field"><label>Recibido por (opcional)</label><input type="text" id="m-note" placeholder="Nombre de quien recogió..."></div>
      <button class="btn-primary" onclick="confirmModal()">✓ Confirmar recogida</button>`;
  }
  else if (type === 'factura') {
    title = 'Factura Electrónica Enviada';
    body = `
      <div class="modal-field"><label>Fecha de envío de la factura *</label><input type="date" id="m-date" value="${today}"></div>
      <button class="btn-primary" onclick="confirmModal()">✓ Confirmar factura enviada</button>`;
  }
  else if (type === 'edit_factura') {
    title = 'Editar Fecha de Factura';
    body = `<div class="edit-highlight">✏️ Editando registro existente</div>
      <div class="modal-field"><label>Fecha de envío de la factura *</label><input type="date" id="m-date" value="${o?.facturaEnviada||today}"></div>
      <button class="btn-primary" onclick="confirmModal()">✓ Guardar cambio</button>`;
  }
  else if (type === 'eliminar') {
    title = 'Eliminar pedido';
    body = `<div class="confirm-delete-box">
      ⚠ <strong>Esta acción es permanente.</strong> El pedido <strong>${num}</strong> (${o?o.client:'cliente'}) será eliminado de la base de datos.
    </div>
    <div class="modal-field" style="margin-bottom:20px"><label>Escribe el número de pedido para confirmar</label><input type="text" id="m-confirm-num" placeholder="${num}"></div>
    <button style="background:var(--coral);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px" onclick="confirmModal()">🗑 Sí, eliminar pedido</button>`;
  }

  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>{const f=document.querySelector('#modal-body input');if(f)f.focus();},100);
}

window.selectTipoEntrega = function(tipo) {
  document.querySelectorAll('.radio-opt').forEach(el => el.classList.remove('selected'));
  const sel = document.querySelector(`.radio-opt [value="${tipo}"]`);
  if (sel) sel.closest('.radio-opt').classList.add('selected');
  document.getElementById('despacho-transportadora').style.display = tipo==='transportadora'?'block':'none';
  document.getElementById('despacho-recogida').style.display = tipo==='recoge_cliente'?'block':'none';
}

window.closeModal = function() {
  document.getElementById('modal-bg').classList.remove('open');
  currentModal = null;
}

window.confirmModal = async function() {
  if (!currentModal) return;
  const {type, num} = currentModal;
  const o = orders.find(x => x.num === num);
  if (!o) return;
  const updated = {...o};
  const today = new Date().toISOString().split('T')[0];

  const getVal = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

  if (type === 'pago' || type === 'edit_pago') {
    const d = getVal('m-date');
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.fechaPago = d;
    if (!updated.status || updated.status === 'pedido_recibido') updated.status = 'pago_verificado';
    toast('✓ Pago verificado');
  }
  else if (type === 'produccion' || type === 'edit_produccion') {
    const fp = getVal('m-fecha-prod');
    if (!fp) { toast('⚠ Selecciona la fecha de entrada'); return; }
    updated.fechaEntradaProduccion = fp;
    const dp = getVal('m-despacho-plan');
    if (dp) updated.fechaDespachoPlan = dp;
    updated.status = 'en_produccion';
    toast('✓ Entrada a producción registrada');
  }
  else if (type === 'despacho') {
    const selected = document.querySelector('.radio-opt.selected input');
    if (!selected) { toast('⚠ Selecciona el tipo de entrega'); return; }
    const tipo = selected.value;
    updated.tipoEntrega = tipo;
    if (tipo === 'transportadora') {
      const trans = getVal('m-trans');
      const fecha = getVal('m-date');
      if (!trans || !fecha) { toast('⚠ Completa transportadora y fecha'); return; }
      updated.transportadora = trans;
      updated.guia = getVal('m-guia');
      updated.fechaDespacho = fecha;
      const fest = getVal('m-festimada');
      if (fest) updated.fechaEstimadaEntrega = fest;
      updated.status = 'despachado';
      toast('✓ Despacho registrado con ' + trans);
    } else {
      const fr = getVal('m-fecha-recogida');
      if (!fr) { toast('⚠ Selecciona la fecha de disponibilidad'); return; }
      updated.fechaDisponibleRecogida = fr;
      const hr = getVal('m-hora-recogida');
      if (hr) updated.horaDisponibleRecogida = hr;
      updated.status = 'recogida_cliente';
      toast('✓ Disponibilidad para recogida registrada');
    }
  }
  else if (type === 'edit_despacho') {
    const trans = getVal('m-trans');
    updated.transportadora = trans;
    updated.guia = getVal('m-guia');
    const fecha = getVal('m-date');
    if (fecha) updated.fechaDespacho = fecha;
    const fest = getVal('m-festimada');
    if (fest) updated.fechaEstimadaEntrega = fest;
    toast('✓ Despacho actualizado');
  }
  else if (type === 'edit_recogida') {
    const fr = getVal('m-fecha-recogida');
    if (!fr) { toast('⚠ Selecciona la fecha'); return; }
    updated.fechaDisponibleRecogida = fr;
    const hr = getVal('m-hora-recogida');
    if (hr) updated.horaDisponibleRecogida = hr;
    toast('✓ Disponibilidad actualizada');
  }
  else if (type === 'entrega' || type === 'entrega_recogida') {
    const d = getVal('m-date');
    if (!d) { toast('⚠ Selecciona fecha'); return; }
    updated.fechaEntrega = d;
    updated.status = 'entregado';
    const nota = getVal('m-note');
    if (nota) updated.obs = (updated.obs?updated.obs+' | ':'')+'Recibido por: '+nota;
    toast('✓ Entrega confirmada');
  }
  else if (type === 'factura' || type === 'edit_factura') {
    const d = getVal('m-date');
    if (!d) { toast('⚠ Selecciona una fecha'); return; }
    updated.facturaEnviada = d;
    updated.status = 'factura_enviada';
    toast('✓ Factura electrónica registrada');
  }
  else if (type === 'eliminar') {
    const confirmNum = getVal('m-confirm-num');
    if (confirmNum !== num) { toast('⚠ El número de pedido no coincide'); return; }
    await deleteOrder(num);
    closeModal();
    return;
  }

  await saveOrder(updated);
  closeModal();
}

window.searchOrder = function() {
  const q = document.getElementById('search-num').value.trim().toLowerCase();
  const el = document.getElementById('search-result');
  if (!q) { el.innerHTML=''; return; }
  const matches = orders.filter(o => o.num.toLowerCase().includes(q)||o.client.toLowerCase().includes(q));
  if (!matches.length) { el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div>No se encontró ningún pedido</div></div>`; return; }
  el.innerHTML = matches.map(o=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div><div style="font-weight:600;font-size:16px">${o.num}</div><div style="font-size:12px;color:var(--text2)">${o.client}${o.city?' · '+o.city:''}</div></div>
        ${badgeHtml(o)}
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Link de seguimiento</div>
      ${shareHtml(o)}
      <div class="tl-wrap"><div class="tl-label">Seguimiento</div>${buildTimeline(o)}</div>
      <div class="action-btns">${buildActions(o)}</div>
    </div>`).join('');
}

window.exportCSV = function() {
  if (!orders.length) { toast('No hay pedidos'); return; }
  const h = ['N° Pedido','Cliente','Teléfono','Ciudad','Estado','Creado','Pago','Entrada Prod.','Tipo Entrega','Transportadora','Guía','Despachado','Entrega Est.','Entregado','Factura','Observaciones'];
  const rows = orders.map(o=>[o.num,o.client,o.phone||'',o.city||'',o.status,o.createdAt||'',o.fechaPago||'',o.fechaEntradaProduccion||'',o.tipoEntrega||'',o.transportadora||'',o.guia||'',o.fechaDespacho||'',o.fechaEstimadaEntrega||'',o.fechaEntrega||'',o.facturaEnviada||'',o.obs||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"'));
  const csv = [h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pedidos_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('✓ Exportado');
}

window.switchTab = function(name) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx={nuevo:0,pedidos:1,buscar:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='pedidos') renderOrders();
  if(name==='buscar'){document.getElementById('search-num').value='';document.getElementById('search-result').innerHTML='';}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
window.toast = toast;

document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderStats();
</script>
</body>
</html>
